<!doctype html>
<html lang="en" data-theme="dark" data-accent="forest">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Niklas Martinek — CV</title>
    <script>
      const s = new URLSearchParams(location.search).get('scheme');
      if (s) {
        window.__scheme = s;
        const theme = document.documentElement.getAttribute('data-theme');
        document.documentElement.setAttribute('data-accent', theme === 'light' ? s + '-light' : s);
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
